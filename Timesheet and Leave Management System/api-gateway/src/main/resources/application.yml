server:
  port: 8080

spring:
  application:
    name: api-gateway
  security:
    user:
      password: disabled
      name: disabled

  cloud:
    gateway:
      server:
        webflux:
          routes:

            - id: identity-service
              uri: lb://IDENTITY-SERVICE
              predicates:
                - Path=/auth/**

            - id: timesheet-service
              uri: lb://TIMESHEET-SERVICE
              predicates:
                - Path=/timesheet/**

            - id: leave-service
              uri: lb://LEAVE-SERVICE
              predicates:
                - Path=/leave/**

            - id: admin-service
              uri: lb://ADMIN-SERVICE
              predicates:
                - Path=/admin/**

            - id: notification-service
              uri: lb://NOTIFICATION-SERVICE
              predicates:
                - Path=/notifications/**

          default-filters:
            - RemoveRequestHeader=X-User-Id
            - RemoveRequestHeader=X-User-Role
            - RemoveRequestHeader=X-User-Email

# ─── JWT ──────────────────────────────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET:a1b1c1d1e1f1gh57e9dbxhsa79snbdebfhe903bjidbc0884bd}
  expiry-ms: ${JWT_EXPIRY_MS:3600000}

# ─── Eureka ───────────────────────────────────────────────────────────────────
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

# ─── Springdoc / Swagger ──────────────────────────────────────────────────────
springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    config-url: /v3/api-docs/swagger-config
    disable-swagger-default-url: true
  api-docs:
    enabled: true
  webjars:
    prefix: /webjars

# ─── Actuator ─────────────────────────────────────────────────────────────────
management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}
  endpoints:
    web:
      exposure:
        include: health, info, gateway
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true

# ─── Logging ──────────────────────────────────────────────────────────────────
logging:
  level:
    com.cap.apigateway: DEBUG
    org.springframework.cloud.gateway: INFO