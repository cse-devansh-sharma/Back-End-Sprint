databaseChangeLog:
  - changeSet:
      id: 003
      author: dtron
      changes:
        - createTable:
            tableName: timesheet_entries
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true

              - column:
                  name: weekly_timesheet_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: project_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: work_date
                  type: DATE
                  constraints:
                    nullable: false

              - column:
                  name: hours_logged
                  type: DECIMAL(4,2)
                  constraints:
                    nullable: false

              - column:
                  name: task_summary
                  type: VARCHAR(500)

              - column:
                  name: created_on
                  type: DATETIME
                  defaultValueComputed: CURRENT_TIMESTAMP

              - column:
                  name: updated_on
                  type: DATETIME
                  defaultValueComputed: CURRENT_TIMESTAMP

        - addForeignKeyConstraint:
            baseTableName: timesheet_entries
            baseColumnNames: weekly_timesheet_id
            referencedTableName: weekly_timesheets
            referencedColumnNames: id
            constraintName: fk_timesheet_entry_week

        - addForeignKeyConstraint:
            baseTableName: timesheet_entries
            baseColumnNames: project_id
            referencedTableName: projects
            referencedColumnNames: id
            constraintName: fk_timesheet_entry_project

        - addUniqueConstraint:
            tableName: timesheet_entries
            columnNames: user_id, project_id, work_date
            constraintName: uq_user_project_date