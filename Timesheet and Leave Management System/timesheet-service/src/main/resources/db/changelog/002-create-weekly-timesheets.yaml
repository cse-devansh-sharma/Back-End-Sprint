databaseChangeLog:
  - changeSet:
      id: 002
      author: dtron
      changes:
        - createTable:
            tableName: weekly_timesheets
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true

              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: week_start
                  type: DATE
                  constraints:
                    nullable: false

              - column:
                  name: total_hours
                  type: DECIMAL(5,2)
                  defaultValueNumeric: 0.0

              - column:
                  name: status
                  type: VARCHAR(20)
                  defaultValue: DRAFT

              - column:
                  name: employee_comment
                  type: TEXT

              - column:
                  name: manager_remark
                  type: TEXT

              - column:
                  name: submitted_at
                  type: DATETIME

              - column:
                  name: actioned_by
                  type: BIGINT

              - column:
                  name: actioned_at
                  type: DATETIME

              - column:
                  name: created_on
                  type: DATETIME
                  defaultValueComputed: CURRENT_TIMESTAMP

              - column:
                  name: updated_on
                  type: DATETIME
                  defaultValueComputed: CURRENT_TIMESTAMP

        - addUniqueConstraint:
            tableName: weekly_timesheets
            columnNames: user_id, week_start
            constraintName: uq_user_week