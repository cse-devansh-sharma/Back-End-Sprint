databaseChangeLog:
  - changeSet:
      id: 003
      author: tms
      changes:
        - createTable:
            tableName: refresh_tokens
            columns:
              - column:
                  name: id
                  type: BIGINT UNSIGNED
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT UNSIGNED
                  constraints:
                    nullable: false
              - column:
                  name: token_hash
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: expires_at
                  type: DATETIME
                  constraints:
                    nullable: false
              - column:
                  name: revoked
                  type: TINYINT(1)
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: created_on
                  type: DATETIME
              - column:
                  name: updated_on
                  type: DATETIME
        - addForeignKeyConstraint:
            baseTableName: refresh_tokens
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_rt_user_id
            onDelete: CASCADE