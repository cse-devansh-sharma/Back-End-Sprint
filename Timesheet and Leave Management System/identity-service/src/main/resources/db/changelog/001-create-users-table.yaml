databaseChangeLog:
  - changeSet:
      id: 001
      author: tms
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: BIGINT UNSIGNED
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: employee_code
                  type: VARCHAR(30)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: full_name
                  type: VARCHAR(120)
                  constraints:
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR(150)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: password_hash
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: role
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: failed_login_count
                  type: TINYINT
                  defaultValueNumeric: 0
              - column:
                  name: last_login_at
                  type: DATETIME
              - column:
                  name: created_by
                  type: VARCHAR(60)
                  constraints:
                    nullable: false
              - column:
                  name: created_on
                  type: DATETIME
              - column:
                  name: updated_on
                  type: DATETIME
              - column:
                  name: is_deleted
                  type: TINYINT(1)
                  defaultValueNumeric: 0