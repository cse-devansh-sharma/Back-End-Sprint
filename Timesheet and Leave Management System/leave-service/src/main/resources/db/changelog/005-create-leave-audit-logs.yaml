databaseChangeLog:
  - changeSet:
      id: 005
      author: tms
      changes:
        - createTable:
            tableName: leave_audit_logs
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true

              - column:
                  name: request_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: action
                  type: VARCHAR(60)
                  constraints:
                    nullable: false

              - column:
                  name: performed_by
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: performed_at
                  type: DATETIME
                  defaultValueComputed: CURRENT_TIMESTAMP

              - column:
                  name: remarks
                  type: TEXT