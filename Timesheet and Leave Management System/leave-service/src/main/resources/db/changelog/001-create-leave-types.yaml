databaseChangeLog:
  - changeSet:
      id: 001
      author: tms
      changes:
        - createTable:
            tableName: leave_types
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: code
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
                    unique: true

              - column:
                  name: name
                  type: VARCHAR(80)
                  constraints:
                    nullable: false

              - column:
                  name: is_paid
                  type: BOOLEAN
                  defaultValueBoolean: true

              - column:
                  name: requires_delegate
                  type: BOOLEAN
                  defaultValueBoolean: false

              - column:
                  name: min_notice_days
                  type: INT
                  defaultValueNumeric: 0

              - column:
                  name: allow_half_day
                  type: BOOLEAN
                  defaultValueBoolean: false

              - column:
                  name: carry_forward_allowed
                  type: BOOLEAN
                  defaultValueBoolean: false

              - column:
                  name: max_carry_forward_days
                  type: INT
                  defaultValueNumeric: 0

              - column:
                  name: is_active
                  type: BOOLEAN
                  defaultValueBoolean: true