databaseChangeLog:
  - changeSet:
      id: 003
      author: tms
      changes:
        - createTable:
            tableName: leave_requests
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true

              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: leave_type_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: from_date
                  type: DATE
                  constraints:
                    nullable: false

              - column:
                  name: to_date
                  type: DATE
                  constraints:
                    nullable: false

              - column:
                  name: number_of_days
                  type: DECIMAL(4,1)
                  constraints:
                    nullable: false

              - column:
                  name: reason
                  type: TEXT
                  constraints:
                    nullable: false

              - column:
                  name: delegate_user_id
                  type: BIGINT

              - column:
                  name: status
                  type: VARCHAR(20)
                  defaultValue: DRAFT

              - column:
                  name: manager_id
                  type: BIGINT

              - column:
                  name: manager_remark
                  type: TEXT

              - column:
                  name: hr_remark
                  type: TEXT

              - column:
                  name: submitted_at
                  type: DATETIME

              - column:
                  name: actioned_at
                  type: DATETIME

              - column:
                  name: created_on
                  type: DATETIME
                  defaultValueComputed: CURRENT_TIMESTAMP

              - column:
                  name: updated_on
                  type: DATETIME
                  defaultValueComputed: CURRENT_TIMESTAMP