databaseChangeLog:
  - changeSet:
      id: 004
      author: tms
      changes:
        - createTable:
            tableName: holidays
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true

              - column:
                  name: holiday_date
                  type: DATE
                  constraints:
                    nullable: false

              - column:
                  name: name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false

              - column:
                  name: type
                  type: VARCHAR(20)
                  constraints:
                    nullable: false

              - column:
                  name: year
                  type: INT
                  constraints:
                    nullable: false

              - column:
                  name: is_active
                  type: BOOLEAN
                  defaultValueBoolean: true

        - addUniqueConstraint:
            tableName: holidays
            columnNames: holiday_date, type
            constraintName: uq_holiday