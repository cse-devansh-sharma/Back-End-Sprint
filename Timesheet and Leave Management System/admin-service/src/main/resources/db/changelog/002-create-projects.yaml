databaseChangeLog:
  - changeSet:
      id: 002
      author: dtron
      changes:
        - createTable:
            tableName: projects
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true

              - column:
                  name: project_code
                  type: VARCHAR(30)
                  constraints:
                    nullable: false
                    unique: true

              - column:
                  name: name
                  type: VARCHAR(150)
                  constraints:
                    nullable: false

              - column:
                  name: cost_center_id
                  type: BIGINT

              - column:
                  name: is_billable
                  type: BOOLEAN
                  defaultValueBoolean: true

              - column:
                  name: is_active
                  type: BOOLEAN
                  defaultValueBoolean: true

              - column:
                  name: created_by
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: created_on
                  type: DATETIME
                  defaultValueComputed: CURRENT_TIMESTAMP

              - column:
                  name: updated_on
                  type: DATETIME
                  defaultValueComputed: CURRENT_TIMESTAMP

        - addForeignKeyConstraint:
            baseTableName: projects
            baseColumnNames: cost_center_id
            referencedTableName: cost_centers
            referencedColumnNames: id
            constraintName: fk_project_cost_center