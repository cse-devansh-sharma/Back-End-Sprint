server:
  port: 8085

spring:
  application:
    name: admin-service

  datasource:
    url: jdbc:mysql://localhost:3306/tms_admin_db
    username: tms_admin_user
    password: admin_pass_123
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false

  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.yaml

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  main:
    allow-bean-definition-overriding: true

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    listener:
      simple:
        auto-startup: true
        default-requeue-rejected: false

jwt:
  secret: a1b1c1d1e1f1gh57e9dbxhsa79snbdebfhe903bjidbc0884bd
  expiry-ms: 3600000

admin:
  timesheet-service-url: http://localhost:8084
  leave-service-url: http://localhost:8083

rabbitmq:
  exchanges:
    timesheet-events: timesheet.events
    leave-events: leave.events
    admin-commands: admin.commands
    master-data-sync: master.data.sync
    notification-events: notification.events
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

springdoc:
  api-docs:
    path: /admin/v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
  packages-to-scan: com.cap.admin.controller